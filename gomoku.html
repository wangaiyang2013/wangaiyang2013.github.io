<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>五子棋 · Aiyang 的小游戏</title>
  <link rel="stylesheet" href="games.css" />
  <link rel="stylesheet" href="gomoku.css" />
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="logo" href="index.html">Aiyang<span class="dot">.</span></a>
      <nav class="nav-links">
        <a href="index.html#about">关于</a>
        <a href="index.html#posts">文章</a>
        <a href="games.html" class="active">游戏角</a>
        <a href="index.html#contact">联系</a>
      </nav>
      <a class="btn-back" href="index.html">← 返回博客</a>
    </div>
  </header>

  <main class="game">
    <h1 class="game-title">⚫⚪ 五子棋 Gomoku</h1>
    <p class="game-sub">你执黑先手，AI 执白 · 点空格落子，先连成五子者胜</p>

    <div class="panel">
      <div class="status" id="status">轮到你了（黑）</div>
      <button class="reset" id="reset" aria-label="重新开始">🔄</button>
    </div>

    <div class="board-wrap">
      <canvas id="board" width="450" height="450"></canvas>
    </div>

    <p class="hint">提示：AI 会优先堵你的活四/活三，也会找自己的胜点。先手优势记得用起来。</p>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> Aiyang · 五子棋 · 由 cash 🐶 协助搭建</p>
  </footer>

  <script src="gomoku.js"></script>
</body>
</html>
