<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飞机大战 · Aiyang 的小游戏</title>
  <link rel="stylesheet" href="games.css" />
  <link rel="stylesheet" href="plane.css" />
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="logo" href="index.html">Aiyang<span class="dot">.</span></a>
      <nav class="nav-links">
        <a href="index.html#about">关于</a>
        <a href="index.html#posts">文章</a>
        <a href="games.html" class="active">游戏角</a>
        <a href="index.html#contact">联系</a>
      </nav>
      <a class="btn-back" href="index.html">← 返回博客</a>
    </div>
  </header>

  <main class="game">
    <h1 class="game-title">✈️ 飞机大战 Plane War</h1>
    <p class="game-sub">移动飞机自动开火 · 方向键 / WASD / 鼠标拖拽 / 触屏滑动 · 吃 🔶 强化火力</p>

    <div class="p-wrap">
      <canvas id="plane" width="400" height="600"></canvas>
      <div class="p-hud">
        <span>得分 <b id="score">0</b></span>
        <span>生命 <b id="lives">❤❤❤</b></span>
      </div>
      <div class="p-overlay" id="overlay">
        <div class="p-overlay-box">
          <div class="p-overlay-title" id="overlayTitle">✈️ 飞机大战</div>
          <div class="p-overlay-sub" id="overlaySub">把敌机统统打下来！</div>
          <button class="p-btn" id="startBtn">开始战斗</button>
        </div>
      </div>
    </div>

    <p class="hint">小提示：躲不掉就贴边走位；🟡 黄色强化道具吃到后火力翻倍、射速翻倍，限时生效。</p>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> Aiyang · 飞机大战 · 由 cash 🐶 协助搭建</p>
  </footer>

  <script src="plane.js"></script>
</body>
</html>
