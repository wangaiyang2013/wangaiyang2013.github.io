<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048 · Aiyang 的小游戏</title>
  <link rel="stylesheet" href="games.css" />
  <link rel="stylesheet" href="2048.css" />
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="logo" href="index.html">Aiyang<span class="dot">.</span></a>
      <nav class="nav-links">
        <a href="index.html#about">关于</a>
        <a href="index.html#posts">文章</a>
        <a href="games.html" class="active">游戏角</a>
        <a href="index.html#contact">联系</a>
      </nav>
      <a class="btn-back" href="index.html">← 返回博客</a>
    </div>
  </header>

  <main class="game">
    <h1 class="game-title">🔢 2048</h1>
    <p class="game-sub">方向键 / WASD / 滑动 · 相同数字合并，挑战 2048</p>

    <div class="panel">
      <div class="counter-wrap">
        <span class="counter-label">分数</span>
        <div class="counter" id="score">0</div>
      </div>
      <button class="reset" id="reset" aria-label="重新开始">🔄</button>
      <div class="counter-wrap">
        <span class="counter-label">最高</span>
        <div class="counter" id="best">0</div>
      </div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="overlay" id="overlay">
        <div class="overlay-box">
          <p id="overlayText"></p>
          <button class="start-btn" id="startBtn">再来一局</button>
        </div>
      </div>
    </div>

    <p class="hint">提示：先往一个方向把大数叠到角落，更容易凑出 2048。</p>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> Aiyang · 2048 · 由 cash 🐶 协助搭建</p>
  </footer>

  <script src="2048.js"></script>
</body>
</html>
